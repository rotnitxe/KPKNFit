version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - TanStack Router
  - Zustand
  - Tailwind CSS
  - Capacitor
  - Supabase
  - esbuild
routes:
  - path: /
    file: components/Home.tsx
    auth_required: false
    description: Home / main dashboard
  - path: /nutrition
    file: components/NutritionView.tsx
    auth_required: false
    description: Nutrition tracking view
  - path: /programs
    file: components/ProgramsView.tsx
    auth_required: false
    description: Programs list
  - path: /programs/$programId
    file: components/ProgramDetail.tsx
    auth_required: false
    description: Program detail view
  - path: /programs/$programId/edit
    file: components/ProgramEditor.tsx
    auth_required: false
    description: Program editor
  - path: /workout
    file: components/WorkoutSession.tsx
    auth_required: false
    description: Active workout session
  - path: /session-editor
    file: components/SessionEditor.tsx
    auth_required: false
    description: Session editor
  - path: /settings
    file: components/SettingsComponent.tsx
    auth_required: false
    description: Settings
  - path: /progress
    file: components/PhysicalProgress.tsx
    auth_required: false
    description: Progress tracking
  - path: /recovery
    file: components/MuscleRecoveryWidget
    auth_required: false
    description: Recovery view
  - path: /sleep
    file: components/SleepTrackerWidget
    auth_required: false
    description: Sleep tracking
  - path: /achievements
    file: components/AchievementsView.tsx
    auth_required: false
    description: Achievements
  - path: /kpkn
    file: components/KPKNView.tsx
    auth_required: false
    description: Exercise knowledge base
  - path: /exercise-database
    file: components/ExerciseDatabaseView.tsx
    auth_required: false
    description: Exercise database
  - path: /food-database
    file: components/FoodDatabaseView.tsx
    auth_required: false
    description: Food database
  - path: /smart-meal-planner
    file: components/SmartMealPlannerView.tsx
    auth_required: false
    description: Smart meal planner
  - path: /body-lab
    file: components/BodyLabView.tsx
    auth_required: false
    description: Body analysis lab
  - path: /log-hub
    file: components/LogHub.tsx
    auth_required: false
    description: Log hub
  - path: /coach
    file: components/CoachView.tsx
    auth_required: false
    description: AI coach
features:
  - name: Home Dashboard
    description: Main home screen with workout summary, readiness, streaks
    files:
      - components/Home.tsx
      - components/home/BatteryHeroSection.tsx
    entry_route: /
    user_interactions:
      - View dashboard cards
      - Navigate via tab bar
      - Tap session card to start workout
    api_calls: []
    auth_required: false
  - name: Programs Management
    description: View and manage training programs
    files:
      - components/ProgramsView.tsx
      - components/ProgramDetail.tsx
      - components/ProgramEditor.tsx
    entry_route: /programs
    user_interactions:
      - View program list
      - Tap program to see detail
      - Edit program
      - Change split
    api_calls: []
    auth_required: false
  - name: Workout Session
    description: Track workout with sets, reps, weight
    files:
      - components/WorkoutSession.tsx
      - components/workout/ExerciseCard.tsx
    entry_route: /workout
    user_interactions:
      - Log sets with reps and weight
      - Use numpad overlay for input
      - Finish workout
    api_calls: []
    auth_required: false
  - name: Session Editor
    description: Edit workout session structure
    files:
      - components/SessionEditor.tsx
      - components/session-editor/ExerciseRow.tsx
    entry_route: /session-editor
    user_interactions:
      - Add/remove exercises
      - Reorder exercises
      - Edit sets configuration
    api_calls: []
    auth_required: false
  - name: Nutrition Tracking
    description: Log meals and track nutrition
    files:
      - components/NutritionView.tsx
      - components/nutrition/NutritionPlanLanding.tsx
    entry_route: /nutrition
    user_interactions:
      - Add nutrition log
      - View meal plans
      - Search food database
    api_calls: []
    auth_required: false
  - name: Settings
    description: App settings and preferences
    files:
      - components/SettingsComponent.tsx
      - stores/settingsStore.ts
    entry_route: /settings
    user_interactions:
      - Change theme
      - Configure notifications
      - Export/import data
    api_calls: []
    auth_required: false
  - name: Exercise Database
    description: Browse exercise knowledge base
    files:
      - components/KPKNView.tsx
      - components/ExerciseDatabaseView.tsx
    entry_route: /kpkn
    user_interactions:
      - Browse by muscle, joint, pattern
      - View exercise details
      - Search exercises
    api_calls: []
    auth_required: false
  - name: Auth (Supabase OAuth)
    description: Sign in with Google or Apple via Supabase
    files:
      - stores/authStore.ts
      - services/supabaseService.ts
    entry_route: /
    user_interactions:
      - Tap sign in with Google
      - Tap sign in with Apple
      - Sign out
    api_calls:
      - method: POST
        endpoint: Supabase auth OAuth flow
    auth_required: false
known_limitations:
  - issue: App uses hash routing (#/) - base path may need adjustment for TestSprite
    location: routes/router.tsx
    impact: Tests may need to target /#/path format
  - issue: Supabase auth requires redirect - may not complete in headless
    location: stores/authStore.ts
    impact: OAuth flows may fail in automated tests
