appId: com.yourprime.app
---
# Flujo: Duplicar un log de nutrición
- launchApp:
    clearState: true
# Crear un log
- tapOn:
    text: "Nutrición"
- tapOn:
    id: "nutrition-example-completos"
- tapOn:
    id: "nutrition-analyze-button"
- extendedWaitUntil:
    visible: "calorías aproximadas"
    timeout: 30000
- tapOn:
    id: "nutrition-save-button"
- assertVisible: "Comida guardada."
# Scroll al historial
- scrollUntilVisible:
    element: "Historial reciente"
    direction: DOWN
# Duplicar
- tapOn:
    text: "Duplicar"
# Verificar notice
- assertVisible: "Comida duplicada."
# Verificar que aparece la copia con " (copia)" en la descripción
- assertVisible: "2 completos italianos (copia)"
